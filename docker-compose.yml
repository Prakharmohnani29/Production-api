services:
  agent-api:
    # Build context points to the local directory containing the Dockerfile
    build: .
    
    # Map port 8000 on your host machine to port 8000 inside the container
    ports:
      - "8000:8000"
    
    # Load secret credential variables automatically from your local .env file
    env_file:
      - .env
      
    # Inject application infrastructure configuration settings
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      
    # Health checks to monitor container runtime stability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      
    # Restart policy to automatically recover from unhandled runtime crashes
    restart: unless-stopped